apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: auth
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - image: us-east4-docker.pkg.dev/sleepr-490610/auth/production
          name: auth
          env:
            - name: PORT
              value: '3002'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth
                  key: secret
            - name: JWT_EXPIRATION
              value: '3600'
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: connectionString
            - name: AUTH_HOST
              value: '0.0.0.0'
            - name: AUTH_PORT
              value: '3003'
          ports:
            - containerPort: 3002
            - containerPort: 3003
